name: Validate Law Files

on:
  pull_request:
    paths:
      - "laws/**"

jobs:
  validate:
    name: Schema & Duplicate Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate law file schemas
        run: node scripts/validate-schema.js

      - name: Check for duplicate IDs
        run: node scripts/check-duplicates.js

      - name: Build check (ensures site still compiles)
        run: npm run build
        env:
          NODE_ENV: production
